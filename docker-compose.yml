services:
  actian:
    image: williamimoh/actian-vectorai-db:1.0b
    ports:
      - "50051"
    restart: unless-stopped
    volumes:
      - actian_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - ACTIAN_HOST=actian
      - ACTIAN_PORT=50051
    depends_on:
      - actian
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

  # Caddy: Uncomment if using a domain with HTTPS
  # caddy:
  #   image: caddy:2-alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./deploy/Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - backend
  #   restart: unless-stopped

volumes:
  actian_data:
  backend_data:
