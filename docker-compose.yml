services:
  actian:
    image: williamimoh/actian-vectorai-db:1.0b
    ports:
      - "50051"
    restart: unless-stopped
    volumes:
      - actian_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - ACTIAN_HOST=actian
      - ACTIAN_PORT=50051
    depends_on:
      - actian
    ports:
      - "8000:8000"
    restart: unless-stopped

